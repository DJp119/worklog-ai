# Worklog Ai Workflow Update Vercel Deployment Config

## Action

Follow the update-vercel-deployment-config workflow:
1. Edit vercel.json to update configuration or environment schema.
2. Optionally update or create scripts/vercel-prepare-output.mjs or client/public/scripts/vercel-prepare-output.mjs to prepare output directory.
3. Edit client/src/App.tsx or client/main.tsx if SPA routing is involved.
4. Commit changes to vercel.json and related scripts.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~4x per month
- Files: vercel.json, client/vercel.json, scripts/vercel-prepare-output.mjs

