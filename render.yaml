services:
  - type: web
    name: worklog-ai-api
    env: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: BREVO_FROM_NAME
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: INTEGRATION_ENCRYPTION_KEY
        sync: false
      - key: JIRA_CLIENT_ID
        sync: false
      - key: JIRA_CLIENT_SECRET
        sync: false
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_PRIVATE_KEY
        sync: false
      - key: GITHUB_APP_WEBHOOK_SECRET
        sync: false
      - key: SLACK_SIGNING_SECRET
        sync: false
      - key: VERCEL_ALLOWED_APPS
        sync: false
    healthCheckPath: /health
